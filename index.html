<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Daraz - Professional Panel</title>
    <style>
        :root { --primary: #f57224; --dark: #0b0e11; --card: #1c1c1c; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; }
        .tab-btn { padding: 10px 20px; cursor: pointer; background: #333; color: white; border: none; }
        .active { background: var(--primary); }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary); text-align: center; }
        .order-table { width: 100%; border-collapse: collapse; background: var(--card); margin-top: 20px; }
        .order-table th, .order-table td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>

<header style="background: var(--card); padding: 15px; border-bottom: 2px solid var(--primary); text-align:center;">
    <button class="tab-btn active" onclick="showView('buyer')">BUYER MARKET</button>
    <button class="tab-btn" onclick="showView('seller')">SELLER DASHBOARD</button>
</header>

<div class="container">
    <div id="buyerView">
        <h2>All Products</h2>
        <div id="productGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:20px;"></div>
    </div>

    <div id="sellerView" style="display:none;">
        <div class="stats-grid">
            <div class="stat-card"><h3>Total Products</h3><h1 id="countProd">0</h1></div>
            <div class="stat-card"><h3>Total Orders</h3><h1 id="countOrder">0</h1></div>
            <div class="stat-card"><h3>Revenue</h3><h1 id="countRev">৳0</h1></div>
        </div>

        <div style="background:var(--card); padding:20px; border-radius:10px;">
            <h3>Post New Product</h3>
            <input type="text" id="pName" placeholder="Product Name" style="width:100%; padding:10px; margin:5px 0;">
            <input type="number" id="pPrice" placeholder="Price" style="width:100%; padding:10px; margin:5px 0;">
            <button onclick="postProduct()" style="background:var(--primary); color:white; border:none; padding:10px; width:100%; cursor:pointer;">PUBLISH</button>
        </div>

        <h3>Recent Orders (আসা অর্ডারগুলোর তালিকা)</h3>
        <table class="order-table">
            <thead>
                <tr><th>Order ID</th><th>Product</th><th>Customer</th><th>Amount</th><th>Status</th></tr>
            </thead>
            <tbody id="orderList"></tbody>
        </table>
    </div>
</div>

<script>
    function showView(v) {
        document.getElementById('buyerView').style.display = v === 'buyer' ? 'block' : 'none';
        document.getElementById('sellerView').style.display = v === 'seller' ? 'block' : 'none';
        if(v === 'seller') loadDashboard();
        else loadMarket();
    }

    function postProduct() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        fetch('/api/seller/post', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, price })
        }).then(() => { alert("Posted!"); loadDashboard(); });
    }

    function loadDashboard() {
        fetch('/api/seller/dashboard').then(r => r.json()).then(data => {
            document.getElementById('countProd').innerText = data.totalProducts;
            document.getElementById('countOrder').innerText = data.totalOrders;
            
            let revenue = data.allOrders.reduce((sum, o) => sum + parseInt(o.amount), 0);
            document.getElementById('countRev').innerText = "৳" + revenue;

            const list = document.getElementById('orderList');
            list.innerHTML = data.allOrders.map(o => `
                <tr><td>${o.orderId}</td><td>${o.productName}</td><td>${o.customer}</td><td>৳${o.amount}</td><td style="color:green;">Paid</td></tr>
            `).join('');
        });
    }

    function loadMarket() {
        fetch('/api/products').then(r => r.json()).then(data => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.map(p => `
                <div style="background:var(--card); padding:15px; border-radius:10px; text-align:center;">
                    <h4>${p.name}</h4>
                    <p style="color:var(--primary)">৳${p.price}</p>
                    <button onclick="buyNow('${p.id}')" style="background:green; color:white; border:none; padding:5px 10px; cursor:pointer;">BUY NOW</button>
                </div>
            `).join('');
        });
    }

    function buyNow(id) {
        const name = prompt("Your Name:");
        const address = prompt("Address:");
        fetch('/api/buyer/order', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ productId: id, customerName: name, address: address })
        }).then(() => alert("Order Successful!"));
    }

    loadMarket();
</script>
</body>
</html>
