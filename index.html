<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalized Cyber Shop</title>
    <style>
        :root { --p: #f57224; --bg: #121212; --c: #1e1e1e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; }
        header { background: var(--p); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: var(--c); border-radius: 10px; overflow: hidden; border: 1px solid #333; position: relative;}
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .tag { position: absolute; top: 5px; right: 5px; background: var(--p); font-size: 10px; padding: 3px 7px; border-radius: 5px;}
        .btn { background: var(--p); color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px;}
        #loginOverlay { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:1000; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div style="text-align:center; background:var(--c); padding:40px; border-radius:15px; border:1px solid var(--p);">
        <h2>Welcome to Cyber Shop</h2>
        <input type="text" id="userIdInput" placeholder="Enter Your ID (e.g. Arif)" style="padding:10px; width:200px; border-radius:5px; border:none;"><br><br>
        <button class="btn" onclick="login()">LOGIN TO SHOP</button>
    </div>
</div>

<header>
    <span>SMART SHOP</span>
    <span id="userDisplay"></span>
</header>

<div class="container">
    <h3 id="recTitle" style="color:var(--p); display:none;">Recommended for You (আপনার জন্য বিশেষ)</h3>
    <div class="grid" id="recGrid" style="margin-bottom:40px;"></div>

    <h3>All Products</h3>
    <div class="grid" id="allGrid"></div>
</div>

<script>
    let currentUserId = "";
    let userHistory = [];

    function login() {
        currentUserId = document.getElementById('userIdInput').value;
        if(!currentUserId) return alert("Enter ID");

        fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId: currentUserId })
        })
        .then(r => r.json()).then(data => {
            userHistory = data.history;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('userDisplay').innerText = "Hello, " + currentUserId;
            loadProducts();
        });
    }

    function loadProducts() {
        fetch('/api/products').then(r => r.json()).then(products => {
            const allGrid = document.getElementById('allGrid');
            const recGrid = document.getElementById('recGrid');
            allGrid.innerHTML = ""; recGrid.innerHTML = "";

            // সবচেয়ে বেশি ক্লিক করা ক্যাটাগরি বের করা (পর্যালোচনা)
            let mostFrequentCat = userHistory.sort((a,b) =>
                userHistory.filter(v => v===a).length - userHistory.filter(v => v===b).length
            ).pop();

            products.forEach(p => {
                const html = `
                    <div class="card">
                        ${p.category === mostFrequentCat ? '<span class="tag">For You</span>' : ''}
                        <img src="${p.img}">
                        <div style="padding:10px;">
                            <h4>${p.name}</h4>
                            <p style="color:var(--p)">৳${p.price}</p>
                            <button class="btn" onclick="trackAndBuy('${p.category}', ${p.price})">BUY NOW</button>
                        </div>
                    </div>`;
                
                if (p.category === mostFrequentCat) {
                    recGrid.innerHTML += html;
                    document.getElementById('recTitle').style.display = 'block';
                }
                allGrid.innerHTML += html;
            });
        });
    }

    function trackAndBuy(category, price) {
        // ক্লিক ট্র্যাক করা (সার্ভারে পাঠানো)
        fetch('/api/track-click', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ userId: currentUserId, category: category })
        }).then(() => {
            alert("Redirecting to Payment Gateway for ৳" + price);
            location.reload(); // রিলোড করলে ডাটা আপডেট হবে এবং রেকমেন্ডেশন চেঞ্জ হবে
        });
    }
</script>
</body>
</html>
