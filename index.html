<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Daraz - Premium Shop</title>
    <style>
        :root { --primary: #ff4a00; --dark: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { background: var(--dark); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { background: var(--primary); padding: 15px; text-align: center; font-size: 24px; font-weight: bold; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .container { max-width: 1000px; margin: 20px auto; padding: 10px; }
        
        /* Product Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; transition: transform 0.3s; border: 1px solid #333; }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .info { padding: 15px; }
        .price { color: var(--primary); font-size: 20px; font-weight: bold; margin: 10px 0; }
        
        /* Buttons */
        button { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { opacity: 0.8; }
        
        /* Cart UI */
        .cart-box { background: var(--card); padding: 20px; margin-top: 30px; border-radius: 12px; border: 1px dashed var(--primary); }
        
        /* Bill UI */
        #billView { display: none; background: white; color: black; padding: 30px; border-radius: 12px; margin-top: 20px; }
        .bill-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>CYBER DARAZ</header>

<div class="container">
    <div id="shopView">
        <div class="grid" id="productGrid"></div>
        
        <div class="cart-box">
            <h3>🛒 Shopping Cart</h3>
            <div id="cartItems">Empty</div>
            <h2 style="color: var(--primary);">Total: ৳<span id="totalPrice">0</span></h2>
            <button onclick="checkout()">PLACE ORDER NOW</button>
        </div>
    </div>

    <div id="billView">
        <div class="bill-header">
            <h1>INVOICE</h1>
            <p>Daraz Cyber-Station Ltd.</p>
        </div>
        <div id="billContent"></div>
        <button style="margin-top:20px;" onclick="location.reload()">DOWNLOAD & BACK</button>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    // লোড প্রোডাক্টস
    fetch('/api/products').then(r => r.json()).then(data => {
        const grid = document.getElementById('productGrid');
        data.forEach(p => {
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <div class="info">
                        <h3>${p.name}</h3>
                        <div class="price">৳${p.price}</div>
                        <button onclick="addToCart('${p.name}', ${p.price})">Add to Cart</button>
                    </div>
                </div>`;
        });
    });

    function addToCart(name, price) {
        cart.push(name);
        total += price;
        document.getElementById('cartItems').innerText = cart.join(" | ");
        document.getElementById('totalPrice').innerText = total;
    }

    function checkout() {
        if(total === 0) return alert("Add items to cart first!");
        const name = prompt("Enter Your Name:");
        const address = prompt("Enter Shipping Address:");

        fetch('/api/checkout', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ name, address, total })
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('shopView').style.display = 'none';
            const bill = document.getElementById('billView');
            bill.style.display = 'block';
            document.getElementById('billContent').innerHTML = `
                <p><strong>Order ID:</strong> ${data.bill.orderId}</p>
                <p><strong>Customer:</strong> ${data.bill.customer}</p>
                <p><strong>Address:</strong> ${data.bill.address}</p>
                <hr>
                <h3>Total Amount: ৳${data.bill.total}</h3>
                <p><strong>Status:</strong> ${data.bill.status}</p>
                <p>Date: ${data.bill.date}</p>
            `;
        });
    }
</script>

</body>
</html>
